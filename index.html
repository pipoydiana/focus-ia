<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Focus IA Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 360px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  transition: 0.3s;
}

h1 {
  margin-bottom: 5px;
}

#estado {
  font-size: 22px;
  margin: 10px 0;
  font-weight: bold;
}

#timer {
  font-size: 38px;
  margin: 10px 0;
}

.progress {
  width: 100%;
  height: 10px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  width: 100%;
  background: #667eea;
  transition: width 1s linear;
}

.stats {
  font-size: 14px;
  margin-bottom: 10px;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

canvas {
  margin-top: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🧠 Focus IA Pro</h1>
  <p>Optimiza tu concentración</p>

  <div class="progress">
    <div class="progress-bar" id="barra"></div>
  </div>

  <h2 id="timer">⏱️ 01:00</h2>
  <h2 id="estado">Estado: ---</h2>

  <div class="stats">
    Distracciones: <span id="contador">0</span>
  </div>

  <button onclick="iniciar()">▶️ Iniciar</button>
  <button onclick="pausar()">⏸️ Pausar</button>

  <div id="webcam-container"></div>
</div>

<audio id="alerta" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

// 🔗 LINK CORREGIDO (con / al final)
const URL = "https://teachablemachine.withgoogle.com/models/rnFxUio5U/";

// VARIABLES
let model, webcam, maxPredictions;

// ⏱️ CONFIG
let tiempoTotal = 60; // demo
let tiempo = tiempoTotal;
let corriendo = false;
let distracciones = 0;

// ▶️ CONTROL
function iniciar() { corriendo = true; }
function pausar() { corriendo = false; }

// ⏱️ TIMER
setInterval(() => {
  if (corriendo && tiempo > 0) {
    tiempo--;

    let min = Math.floor(tiempo / 60);
    let sec = tiempo % 60;

    document.getElementById("timer").innerText =
      `⏱️ ${min}:${sec < 10 ? "0" : ""}${sec}`;

    let progreso = (tiempo / tiempoTotal) * 100;
    document.getElementById("barra").style.width = progreso + "%";
  }

  if (tiempo === 0) {
    alert("Tiempo de descanso 😌");
    corriendo = false;
  }
}, 1000);

// 🤖 IA
async function init() {
  const modelURL = URL + "model.json";
  const metadataURL = URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);
  maxPredictions = model.getTotalClasses();

  webcam = new tmImage.Webcam(300, 300, true);
  await webcam.setup();
  await webcam.play();

  document.getElementById("webcam-container").appendChild(webcam.canvas);
  window.requestAnimationFrame(loop);
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

// 🧠 PREDICCIÓN
async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let mayor = 0;
  let clase = "";

  for (let i = 0; i < maxPredictions; i++) {
    if (prediction[i].probability > mayor) {
      mayor = prediction[i].probability;
      clase = prediction[i].className;
    }
  }

  if (clase === "Concentrado") {
    document.getElementById("estado").innerText = "🟢 Concentrado";
    document.querySelector(".container").style.background = "#e6fffa";
  } else {
    document.getElementById("estado").innerText = "🔴 Distraído";
    document.querySelector(".container").style.background = "#ffe6e6";
    alerta();
  }
}

// 🔔 ALERTA
function alerta() {
  document.getElementById("alerta").play();
  distracciones++;
  document.getElementById("contador").innerText = distracciones;
}

// 🚀 INICIO SEGURO (para navegador)
let iniciado = false;

document.body.addEventListener("click", () => {
  if (!iniciado) {
    iniciado = true;
    init();
  }
});

</script>

</body>
</html>
